name: Reset seen URLs

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
      - name: Reset seen_urls
        run: python src/reset_seen.py
      - name: Commit updated DB
        run: |
          git config user.name "ppa-tracker-bot"
          git config user.email "bot@ppa-tracker"
          git add data/ppa_deals.db
          git diff --staged --quiet || git commit -m "chore: reset seen_urls"
          git push
