name: PPA Tracker Daily Run

on:
  schedule:
    # Runs every day at 07:00 UTC
    - cron: "0 7 * * *"
  workflow_dispatch:  # allows manual trigger from GitHub UI
    inputs:
      target_env:
        description: 'Select environment'
        required: true
        default: 'Prod'
        type: choice
        options:
          - Test
          - Prod
      start_date:
        description: 'Start date (YYYY-MM-DD) for historical runs'
        required: false
        default: ''
      end_date:
        description: 'End date (YYYY-MM-DD) for historical runs'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    # If activated from cron (schedule) set 'Prod', otherwise take manual input
    environment: ${{ github.event_name == 'schedule' && 'Prod' || github.event.inputs.target_env }}
    
    permissions:
      contents: write  # needed to commit CSV back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          # Fetch full history so we can commit back cleanly
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database from previous run
        run: |
          # If a cached DB exists from a previous artifact, restore it.
          # Otherwise start fresh (init_db handles this).
          if [ -f data/ppa_deals.db ]; then
            echo "Existing DB found in repo."
          else
            echo "No existing DB, will be created fresh."
          fi
          
      - name: Resolve effective start date
        run: |
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            echo "EFFECTIVE_START_DATE=${{ github.event.inputs.start_date }}" >> $GITHUB_ENV
          else
            echo "EFFECTIVE_START_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          fi
      
      - name: Run pipeline
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          MISTRAL_KEY: ${{ secrets.MISTRAL_KEY }}
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
          LOOKBACK_DAYS: ${{ vars.LOOKBACK_DAYS }}
          MAX_ARTICLES: ${{ vars.MAX_ARTICLES }}
          SEARCH_FROM_DATE: ${{ env.EFFECTIVE_START_DATE }}          
          SEARCH_TO_DATE: ${{ github.event.inputs.end_date || vars.SEARCH_TO_DATE }}
          NOTIFY_EMAIL_ENABLED: ${{ vars.NOTIFY_EMAIL_ENABLED }}
          NOTIFY_SMTP_HOST: ${{ secrets.NOTIFY_SMTP_HOST }}
          NOTIFY_SMTP_PORT: ${{ secrets.NOTIFY_SMTP_PORT }}
          NOTIFY_SMTP_USER: ${{ secrets.NOTIFY_SMTP_USER }}
          NOTIFY_SMTP_PASSWORD: ${{ secrets.NOTIFY_SMTP_PASSWORD }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          ENVIRONMENT: ${{ vars.ENVIRONMENT }}
        run: python src/pipeline.py

      - name: Commit updated DB and CSV to repo
        run: |
          git config user.name "ppa-tracker-bot"
          git config user.email "bot@ppa-tracker"
          git add data/ppa_deals.db data/ppa_deals.csv data/logs/
          git stash --include-untracked
          git pull --rebase origin main
          git stash pop
          git add data/ppa_deals.db data/ppa_deals.csv data/logs/
          git diff --staged --quiet || git commit -m "chore: daily update $(date -u '+%Y-%m-%d')"
          git push
