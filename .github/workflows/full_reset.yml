name: Full Database Reset

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
      - name: Reset database
        run: |
          python -c "
          import sqlite3, os
          from pathlib import Path
          DB_PATH = Path('data/ppa_deals.db')
          CSV_PATH = Path('data/ppa_deals.csv')
          conn = sqlite3.connect(DB_PATH)
          conn.execute('DELETE FROM seen_urls')
          conn.execute('DELETE FROM deals')
          conn.commit()
          if CSV_PATH.exists():
              os.remove(CSV_PATH)
          conn.close()
          "
      - name: Commit changes
        run: |
          git config user.name "ppa-tracker-bot"
          git config user.email "bot@ppa-tracker"
          git add data/
          git diff --staged --quiet || git commit -m "chore: full database reset"
          git push
